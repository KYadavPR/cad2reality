<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CAD2Reality — AR Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: white;
            touch-action: none;
        }
        #container { width: 100vw; height: 100vh; }

        /* ── Top status bar ───────────────────────── */
        #top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            z-index: 200;
            pointer-events: none;
        }
        #app-title {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
        }
        #app-title span {
            color: #00e5ff;
        }
        #status-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(0,229,255,0.15);
            border: 1px solid rgba(0,229,255,0.5);
            color: #00e5ff;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Scan instruction overlay ────────────── */
        #scan-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 150;
            pointer-events: none;
            display: none;
        }
        #scan-ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid rgba(0,229,255,0.4);
            margin: 0 auto 16px;
            position: relative;
            animation: pulse-ring 2s ease-in-out infinite;
        }
        #scan-ring::before {
            content: '';
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            border: 2px solid rgba(0,229,255,0.25);
        }
        #scan-ring::after {
            content: '';
            position: absolute;
            inset: 20px;
            border-radius: 50%;
            background: rgba(0,229,255,0.05);
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 0.4; }
        }
        #scan-text {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.85);
            line-height: 1.5;
        }
        #scan-text strong {
            color: #00e5ff;
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
        }

        /* ── Place instruction ───────────────────── */
        #place-hint {
            position: absolute;
            bottom: 200px; left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 8px 18px;
            z-index: 150;
            display: none;
            pointer-events: none;
        }

        /* ── Gesture hint after placement ────────── */
        #gesture-hint {
            position: absolute;
            top: 80px; left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 500;
            color: rgba(255,255,255,0.65);
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            padding: 6px 14px;
            z-index: 150;
            display: none;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }

        /* ── Bottom control panel ─────────────────── */
        #bottom-panel {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px 20px 36px;
            background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
            z-index: 200;
            display: none;
        }
        #render-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .render-btn {
            flex: 1;
            max-width: 110px;
            padding: 10px 6px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .render-btn.active {
            background: rgba(0,229,255,0.2);
            border-color: #00e5ff;
            color: #00e5ff;
        }
        .render-btn:active { transform: scale(0.95); }

        #action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-btn {
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .action-btn:active { transform: scale(0.95); }
        #btn-reset { background: rgba(255,80,80,0.2); border-color: rgba(255,80,80,0.5); }
        #btn-native-ar { background: rgba(0,200,80,0.2); border-color: rgba(0,200,80,0.5); color: #4dff91; }
        #btn-ar-webxr {
            background: rgba(0,229,255,0.2);
            border-color: rgba(0,229,255,0.5);
            color: #00e5ff;
            width: 100%;
            margin-bottom: 10px;
            font-size: 15px;
            padding: 15px;
        }

        /* ── Sensor panel ──────────────────────────── */
        #sensor-panel {
            position: absolute;
            top: 70px; right: 14px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 10px;
            padding: 8px 12px;
            font-family: 'Inter', monospace;
            font-size: 10px;
            color: #00e5ff;
            z-index: 150;
            pointer-events: none;
            display: none;
            flex-direction: column;
            gap: 3px;
            min-width: 160px;
        }
        .srow { display: flex; justify-content: space-between; gap: 8px; }
        .slabel { color: rgba(255,255,255,0.5); }
        .sval { font-weight: 600; text-align: right; }

        /* ── HTTPS hint ────────────────────────────── */
        #https-hint {
            position: absolute;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,150,0,0.9);
            color: #000;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            z-index: 300;
            text-align: center;
            display: none;
            max-width: 80%;
        }

        /* ── Scale indicator ring ─────────────────── */
        #scale-indicator {
            position: absolute;
            bottom: 240px; right: 20px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.8);
            z-index: 150;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="container"></div>

<!-- Top bar -->
<div id="top-bar">
    <div id="app-title">CAD<span>2</span>Reality</div>
    <div id="status-badge" id="status-badge">● SCANNING</div>
</div>

<!-- HTTPS hint -->
<div id="https-hint">⚠️ Open in Chrome for full AR. Tap ARCore button below!</div>

<!-- Scan ring overlay -->
<div id="scan-overlay">
    <div id="scan-ring"></div>
    <div id="scan-text">
        <strong>Scanning Surface</strong>
        Move your phone slowly over the floor
    </div>
</div>

<!-- Place hint -->
<div id="place-hint">👆 Tap to place your model</div>

<!-- Gesture hint (shown after placement) -->
<div id="gesture-hint">🤏 Pinch: Scale &nbsp;|&nbsp; ☝️ Drag: Rotate</div>

<div id="scale-indicator">Scale: 1.0×</div>

<!-- Sensor panel -->
<div id="sensor-panel">
    <div class="srow"><span class="slabel">Mode:</span><span class="sval" id="val-tracking">WebXR SLAM</span></div>
    <div class="srow"><span class="slabel">Anchor:</span><span class="sval" id="val-anchor">Scanning…</span></div>
    <div class="srow"><span class="slabel">Pitch/Roll:</span><span class="sval" id="val-tilt">—</span></div>
    <div class="srow"><span class="slabel">Heading:</span><span class="sval" id="val-yaw">—</span></div>

<!-- Bottom panel (shown after model loads) -->
<div id="bottom-panel">
    <!-- Render mode row -->
    <div id="render-row">
        <button class="render-btn active" id="btn-solid">🔵 Solid</button>
        <button class="render-btn" id="btn-wireframe">⬡ Wire</button>
        <button class="render-btn" id="btn-xray">💠 X-Ray</button>
    </div>
    <!-- Action buttons -->
    <div id="action-row">
        <button class="action-btn" id="btn-native-ar">📷 ARCore View</button>
        <button class="action-btn" id="btn-reset">🔄 Reposition</button>
    </div>
</div>

<!-- Three.js import map -->
<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { ARButton } from 'three/addons/webxr/ARButton.js';

// ─── Template variables ─────────────────────────────────────────────────────
const modelUrl   = "{{ model_url|safe }}";
const modelWidth = parseFloat("{{ model_width|default:'0' }}");
const modelHeight = parseFloat("{{ model_height|default:'0' }}");

// ─── Three.js state ─────────────────────────────────────────────────────────
let camera, scene, renderer, controls;
let modelGroup   = new THREE.Group();
let originalMats = new Map();
let shadowPlane;
let modelLoaded  = false;

// ─── AR / Anchor state ───────────────────────────────────────────────────────
let reticle;
let hitTestSource = null;
let hitTestRequested = false;
let modelPlaced  = false;
let userTapped   = false;
let xrAnchor     = null;
let placedYaw    = 0;
let anchorInitialYaw = 0;
let hasAnchorInitialYaw = false;

// ─── Gesture state (touch) ───────────────────────────────────────────────────
let gestureState = {
    isPinching: false,
    isRotating: false,
    startPinchDist: 0,
    startScale: 1,
    currentScale: 1,
    startRotY: 0,
    startTouchX: 0,
    lastTouchX: 0,
};

// ─── UI elements ─────────────────────────────────────────────────────────────
const $  = (id) => document.getElementById(id);
const statusBadge  = $('status-badge');
const scanOverlay  = $('scan-overlay');
const placeHint    = $('place-hint');
const gestureHint  = $('gesture-hint');
const bottomPanel  = $('bottom-panel');
const scaleIndicator = $('scale-indicator');
const sensorPanel  = $('sensor-panel');

// ─── Init ────────────────────────────────────────────────────────────────────
init();
animate();

function init() {
    const container = $('container');

    // Scene
    scene = new THREE.Scene();

    // Lighting — professional 3-point lighting for BIM model feel
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.5);
    dirLight.position.set(3, 6, 4);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 20;
    dirLight.shadow.camera.left = dirLight.shadow.camera.bottom = -3;
    dirLight.shadow.camera.right = dirLight.shadow.camera.top = 3;
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x88ccff, 0.6);
    fillLight.position.set(-3, 2, -2);
    scene.add(fillLight);

    // Camera
    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 1.5, 3);

    // Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.setClearColor(0x000000, 0);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Orbit controls (preview mode only)
    controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.25, 0);
    controls.minDistance = 0.5;
    controls.maxDistance = 8;
    controls.update();

    // AR button — optional anchors so it launches on any device
    const arButton = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['anchors', 'dom-overlay'],
        domOverlay: { root: document.body }
    });
    arButton.id = 'btn-ar-webxr';
    arButton.className = 'action-btn';
    arButton.style.cssText = `
        position: absolute;
        bottom: 240px;
        left: 50%;
        transform: translateX(-50%);
        width: 260px;
        padding: 16px;
        font-size: 15px;
        font-weight: 700;
        border-radius: 14px;
        background: rgba(0,229,255,0.2);
        border: 2px solid rgba(0,229,255,0.7);
        color: #00e5ff;
        font-family: Inter, sans-serif;
        z-index: 300;
    `;
    document.body.appendChild(arButton);

    if (window.location.protocol === 'http:') {
        $('https-hint').style.display = 'block';
    }

    // Reticle (placement indicator ring)
    const reticleGeo = new THREE.RingGeometry(0.08, 0.12, 36).rotateX(-Math.PI / 2);
    const reticleMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, side: THREE.DoubleSide });
    reticle = new THREE.Mesh(reticleGeo, reticleMat);
    reticle.matrixAutoUpdate = false;
    reticle.visible = false;
    scene.add(reticle);

    // Shadow plane (visible under the placed model)
    const shadowGeo = new THREE.PlaneGeometry(4, 4);
    const shadowMat = new THREE.ShadowMaterial({ opacity: 0.35 });
    shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.receiveShadow = true;
    shadowPlane.visible = false;
    scene.add(shadowPlane);

    // XR Controller tap
    const controller = renderer.xr.getController(0);
    controller.addEventListener('select', onSelect);
    scene.add(controller);

    // Session events
    renderer.xr.addEventListener('sessionstart', onSessionStart);
    renderer.xr.addEventListener('sessionend', onSessionEnd);

    // Load model
    scene.add(modelGroup);
    loadModel();

    // Touch gestures for AR manipulation
    setupTouchGestures();

    // Precision sensors
    setupSensors();

    window.addEventListener('resize', onResize);
    setupUI();
}

// ─── Load GLTF ───────────────────────────────────────────────────────────────
function loadModel() {
    const loader = new GLTFLoader();
    loader.load(modelUrl, (gltf) => {
        const model = gltf.scene;

        // Normalize size to ~0.8m tall in AR
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        if (maxDim > 0) {
            const scale = 0.8 / maxDim;
            model.scale.setScalar(scale);
        }

        // Center horizontally, sit on Y=0
        const box2 = new THREE.Box3().setFromObject(model);
        model.position.x = -center.x * model.scale.x;
        model.position.y = -box2.min.y;
        model.position.z = -center.z * model.scale.z;

        // Enable shadows + cache materials
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                if (!child.material || !(child.material instanceof THREE.MeshStandardMaterial)) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: child.material?.color ?? 0x888888,
                        metalness: 0.3,
                        roughness: 0.6
                    });
                }
                originalMats.set(child.uuid, child.material.clone());
            }
        });

        modelGroup.add(model);
        modelLoaded = true;
        bottomPanel.style.display = 'block';

        // Dimension label as 3D sprite (not CSS2D — works in AR)
        if (modelWidth > 0 && modelHeight > 0) {
            addDimensionSprite(box2, modelWidth, modelHeight, model.scale.x);
        }

    }, undefined, (err) => {
        console.error('Model load error:', err);
    });
}

// ─── Dimension label as canvas texture sprite ─────────────────────────────
function addDimensionSprite(box, w, h, scale) {
    const canvas = document.createElement('canvas');
    canvas.width = 340; canvas.height = 60;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    roundRect(ctx, 0, 0, 340, 60, 12);
    ctx.fill();
    ctx.strokeStyle = '#00e5ff';
    ctx.lineWidth = 2;
    roundRect(ctx, 0, 0, 340, 60, 12);
    ctx.stroke();
    ctx.fillStyle = '#00e5ff';
    ctx.font = 'bold 22px Inter, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`W: ${w} mm  ×  H: ${h} mm`, 170, 38);

    const tex = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(0.5, 0.09, 1);
    sprite.position.set(0, box.max.y + 0.12, 0);
    modelGroup.add(sprite);
}

function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ─── Session events ───────────────────────────────────────────────────────────
function onSessionStart() {
    controls.enabled = false;
    modelGroup.visible = false;
    modelPlaced = false;
    xrAnchor = null;
    placedYaw = 0;
    hasAnchorInitialYaw = false;
    shadowPlane.visible = false;

    scanOverlay.style.display = 'block';
    placeHint.style.display = 'none';
    gestureHint.style.display = 'none';
    scaleIndicator.style.display = 'none';
    sensorPanel.style.display = 'flex';
    $('btn-reset').style.display = 'none';
    $('https-hint').style.display = 'none';
    updateStatus('SCANNING', '#00e5ff');
}

function onSessionEnd() {
    controls.enabled = true;
    modelGroup.visible = true;
    modelPlaced = false;
    xrAnchor = null;
    modelGroup.position.set(0, 0, 0);
    modelGroup.rotation.set(0, 0, 0);
    gestureState.currentScale = 1;
    modelGroup.scale.setScalar(1);
    shadowPlane.visible = false;

    scanOverlay.style.display = 'none';
    placeHint.style.display = 'none';
    gestureHint.style.display = 'none';
    scaleIndicator.style.display = 'none';
    sensorPanel.style.display = 'none';
    updateStatus('PREVIEW', 'rgba(255,255,255,0.6)');

    if (window.location.protocol === 'http:') {
        $('https-hint').style.display = 'block';
    }
}

function updateStatus(text, color) {
    statusBadge.textContent = `● ${text}`;
    statusBadge.style.color = color;
    statusBadge.style.borderColor = color;
    statusBadge.style.background = color.replace(')', ', 0.12)').replace('rgb', 'rgba');
}

// ─── On Tap (XR controller select) ──────────────────────────────────────────
function onSelect() {
    if (reticle.visible && !modelPlaced) {
        userTapped = true;
    }
}

// ─── Touch gestures ──────────────────────────────────────────────────────────
function setupTouchGestures() {
    const canvas = renderer.domElement;

    canvas.addEventListener('touchstart', (e) => {
        if (!modelPlaced) return;
        e.preventDefault();
        if (e.touches.length === 2) {
            gestureState.isPinching = true;
            gestureState.isRotating = false;
            gestureState.startPinchDist = getTouchDist(e.touches);
            gestureState.startScale = gestureState.currentScale;
        } else if (e.touches.length === 1) {
            gestureState.isRotating = true;
            gestureState.isPinching = false;
            gestureState.startTouchX = e.touches[0].clientX;
            gestureState.startRotY = modelGroup.rotation.y;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (!modelPlaced) return;
        e.preventDefault();

        if (gestureState.isPinching && e.touches.length === 2) {
            const dist = getTouchDist(e.touches);
            const ratio = dist / gestureState.startPinchDist;
            gestureState.currentScale = Math.max(0.1, Math.min(5, gestureState.startScale * ratio));
            modelGroup.scale.setScalar(gestureState.currentScale);
            shadowPlane.scale.setScalar(gestureState.currentScale);
            scaleIndicator.textContent = `Scale: ${gestureState.currentScale.toFixed(2)}×`;
            scaleIndicator.style.display = 'block';

        } else if (gestureState.isRotating && e.touches.length === 1) {
            const dx = e.touches[0].clientX - gestureState.startTouchX;
            modelGroup.rotation.y = gestureState.startRotY + dx * 0.01;
        }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) gestureState.isPinching = false;
        if (e.touches.length < 1) gestureState.isRotating = false;
        setTimeout(() => { scaleIndicator.style.display = modelPlaced ? 'none' : 'none'; }, 1500);
    }, { passive: false });
}

function getTouchDist(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

// ─── GPS + IMU sensors ───────────────────────────────────────────────────────
function setupSensors() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            (pos) => {
                const lat = pos.coords.latitude.toFixed(5);
                const lon = pos.coords.longitude.toFixed(5);
                const acc = pos.coords.accuracy.toFixed(0);
                const el = $('val-gps');
                if (el) el.textContent = `${lat}, ${lon} (±${acc}m)`;
            },
            () => { const el = $('val-gps'); if (el) el.textContent = 'Denied'; },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    }

    window.addEventListener('devicemotion', (e) => {
        const a = e.acceleration;
        if (!a) return;
        const mag = Math.sqrt((a.x||0)**2 + (a.y||0)**2 + (a.z||0)**2);
        const el = $('val-acc');
        if (el) el.textContent = `${mag.toFixed(2)} m/s²`;
    });
}

// ─── UI buttons ───────────────────────────────────────────────────────────────
function setupUI() {
    const btnSolid = $('btn-solid');
    const btnWire  = $('btn-wireframe');
    const btnXray  = $('btn-xray');

    function setActiveRender(btn) {
        [btnSolid, btnWire, btnXray].forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    btnSolid.addEventListener('click', () => {
        setActiveRender(btnSolid);
        modelGroup.traverse(c => {
            if (c.isMesh && originalMats.has(c.uuid))
                c.material = originalMats.get(c.uuid).clone();
        });
    });

    btnWire.addEventListener('click', () => {
        setActiveRender(btnWire);
        modelGroup.traverse(c => {
            if (c.isMesh && originalMats.has(c.uuid))
                c.material = new THREE.MeshStandardMaterial({
                    color: originalMats.get(c.uuid).color,
                    wireframe: true
                });
        });
    });

    btnXray.addEventListener('click', () => {
        setActiveRender(btnXray);
        modelGroup.traverse(c => {
            if (c.isMesh)
                c.material = new THREE.MeshStandardMaterial({
                    color: 0x00bbff, transparent: true, opacity: 0.32,
                    depthWrite: false, side: THREE.DoubleSide
                });
        });
    });

    $('btn-reset').addEventListener('click', () => {
        modelPlaced = false;
        modelGroup.visible = false;
        shadowPlane.visible = false;
        gestureState.currentScale = 1;
        modelGroup.scale.setScalar(1);
        scanOverlay.style.display = 'block';
        placeHint.style.display = 'none';
        gestureHint.style.display = 'none';
        $('btn-reset').style.display = 'none';
        hasAnchorInitialYaw = false;
        updateStatus('SCANNING', '#00e5ff');

        if (xrAnchor) {
            try { xrAnchor.delete(); } catch(e) {}
            xrAnchor = null;
        }
    });

    $('btn-native-ar').addEventListener('click', () => {
        if (window.ReactNativeWebView?.postMessage) {
            window.ReactNativeWebView.postMessage(JSON.stringify({ type: 'launch_ar', modelUrl }));
        } else {
            window.location.href = `https://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(modelUrl)}&mode=ar_preferred`;
        }
    });
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// ─── Animate ─────────────────────────────────────────────────────────────────
function animate() {
    renderer.setAnimationLoop(render);
}

// ─── Main render loop ─────────────────────────────────────────────────────────
function render(timestamp, frame) {
    if (frame) {
        const session = renderer.xr.getSession();
        const refSpace = renderer.xr.getReferenceSpace();
        if (!refSpace) { renderer.render(scene, camera); return; }

        // ── 1. Request hit-test source once ────────────────────────────────
        if (!hitTestRequested) {
            session.requestReferenceSpace('viewer').then(vs => {
                session.requestHitTestSource({ space: vs }).then(src => {
                    hitTestSource = src;
                });
            });
            session.addEventListener('end', () => {
                hitTestRequested = false;
                hitTestSource = null;
            });
            hitTestRequested = true;
        }

        // ── 2. Hit-test → show reticle ─────────────────────────────────────
        if (hitTestSource && !modelPlaced) {
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length > 0) {
                const hit = results[0];
                const hitPose = hit.getPose(refSpace);
                const hitMatrix = new THREE.Matrix4().fromArray(hitPose.transform.matrix);
                const hitPos = new THREE.Vector3().setFromMatrixPosition(hitMatrix);

                // Align reticle with floor but face current camera yaw
                const camEuler = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
                reticle.matrix.makeRotationY(camEuler.y);
                reticle.matrix.setPosition(hitPos);
                reticle.visible = true;

                // Show place hint once plane is detected
                if (scanOverlay.style.display !== 'none') {
                    scanOverlay.style.display = 'none';
                    placeHint.style.display = 'block';
                    updateStatus('PLANE FOUND', '#4dff91');
                }

                // ── 3. User tapped → place model ───────────────────────────
                if (userTapped) {
                    userTapped = false;

                    // Instantly lock model at hit position — gravity-aligned upright
                    placedYaw = camEuler.y;
                    modelGroup.position.copy(hitPos);
                    modelGroup.rotation.set(0, placedYaw, 0);
                    modelGroup.scale.setScalar(gestureState.currentScale);
                    modelGroup.visible = true;

                    // Shadow plane at same position
                    shadowPlane.position.copy(hitPos);
                    shadowPlane.visible = true;

                    modelPlaced = true;
                    reticle.visible = false;
                    placeHint.style.display = 'none';
                    gestureHint.style.display = 'block';
                    $('btn-reset').style.display = 'block';
                    updateStatus('ANCHORED', '#00e5ff');

                    // Attempt persistent WebXR anchor
                    let anchorP = null;
                    if (typeof hit.createAnchor === 'function') {
                        anchorP = hit.createAnchor();
                    } else if (typeof frame.createAnchor === 'function') {
                        anchorP = frame.createAnchor(hitPose.transform, refSpace);
                    }
                    if (anchorP) {
                        anchorP.then(a => {
                            xrAnchor = a;
                            hasAnchorInitialYaw = false;
                            updateStatus('PINS-LOCKED', '#00e5ff');
                        }).catch(err => console.warn('Anchor failed, static ok:', err));
                    }
                }
            } else {
                reticle.visible = false;
            }
        } else if (modelPlaced) {
            reticle.visible = false;
        }

        // ── 4. Track anchor — update world position to cancel SLAM drift ───
        if (modelPlaced && xrAnchor) {
            const anchorPose = frame.getPose(xrAnchor.anchorSpace, refSpace);
            if (anchorPose) {
                const m = new THREE.Matrix4().fromArray(anchorPose.transform.matrix);
                modelGroup.position.setFromMatrixPosition(m);
                shadowPlane.position.copy(modelGroup.position);

                const ae = new THREE.Euler().setFromRotationMatrix(m, 'YXZ');
                if (!hasAnchorInitialYaw) {
                    anchorInitialYaw = ae.y;
                    hasAnchorInitialYaw = true;
                }
                // Preserve user rotation + only apply SLAM yaw correction
                const yawCorrection = ae.y - anchorInitialYaw;
                modelGroup.rotation.y = placedYaw + yawCorrection;
                // Enforce perfectly vertical (no pitch/roll tilt from surface normal)
                modelGroup.rotation.x = 0;
                modelGroup.rotation.z = 0;
            }
        }

        // ── 5. Sync camera matrices for correct screen-space calculations ──
        const xrCam = renderer.xr.getCamera();
        const activeCam = (xrCam.cameras && xrCam.cameras.length > 0) ? xrCam.cameras[0] : xrCam;
        camera.position.copy(activeCam.position);
        camera.quaternion.copy(activeCam.quaternion);
        camera.projectionMatrix.copy(activeCam.projectionMatrix);
        camera.matrixWorld.copy(activeCam.matrixWorld);
        camera.matrixWorldInverse.copy(activeCam.matrixWorldInverse);

        // ── 6. Sensor telemetry overlay ────────────────────────────────────
        const eu = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
        const toDeg = r => (r * 180 / Math.PI).toFixed(1);
        const tiltEl   = $('val-tilt');
        const yawEl    = $('val-yaw');
        const anchorEl = $('val-anchor');
        if (tiltEl) tiltEl.textContent  = `${toDeg(eu.x)}° / ${toDeg(eu.z)}°`;
        if (yawEl)  yawEl.textContent   = `${toDeg(eu.y)}°`;
        if (anchorEl) {
            if (!modelPlaced) {
                anchorEl.textContent = reticle.visible ? 'PLANE DETECTED' : 'Scanning…';
                anchorEl.style.color = reticle.visible ? '#4dff91' : '#ff4444';
            } else if (xrAnchor) {
                anchorEl.textContent = 'PINS-LOCKED';
                anchorEl.style.color = '#00e5ff';
            } else {
                anchorEl.textContent = 'STATIC';
                anchorEl.style.color = '#ffcc00';
            }
        }
    }

    // Preview mode — auto-rotate
    if (!renderer.xr.isPresenting) {
        modelGroup.rotation.y += 0.004;
        if (controls.enabled) controls.update();
    }

    renderer.render(scene, camera);
}
</script>
